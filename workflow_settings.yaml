defaultProject: allforwood-dev
defaultDataset: afw_amazon_fact
defaultLocation: US
defaultAssertionDataset: afw_amazon_fact

# Kiến trúc 4 lớp + mart: Raw (C# AfwAmazonSync ghi) → Staging → Master & Fact → Mart
#   - C# chỉ ĐỌC/GHI raw + state; Dataform sở hữu staging → master → fact → mart.
#   - 5 dataset TÁCH RIÊNG (raw/staging/master/fact/mart) — master KHÔNG còn gộp vào fact.
#   - Tách dev/prod theo GCP project (allforwood-dev vs allforwood),
#     KHÔNG dùng _dev suffix — cùng tên dataset, khác project.
#   - Location phải khớp BigQuery dataset location (US multi-region).
#     Dataform repo region (us-central1) KHÔNG cần khớp defaultLocation.

vars:
  raw_dataset:     afw_amazon_raw
  staging_dataset: afw_amazon_staging
  fact_dataset:    afw_amazon_fact
  master_dataset:  afw_amazon_master
  mart_dataset:    afw_amazon_mart
